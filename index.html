<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kärcher Georgia — AI ხმოვანი ასისტენტი</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23FFD700'/><text x='50' y='70' text-anchor='middle' font-family='Arial' font-weight='800' font-size='60' fill='%231a1a1a'>K</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }

    .logo {
      width: 56px; height: 56px;
      background: #FFD700;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 28px; color: #0a0a0a;
      margin-bottom: 32px;
    }

    h1 {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
    }
    h1 span { color: #FFD700; }

    p {
      font-size: 16px;
      color: #888;
      max-width: 400px;
      line-height: 1.6;
      margin-bottom: 40px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,215,0,0.1);
      border: 1px solid rgba(255,215,0,0.2);
      padding: 6px 16px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 600;
      color: #FFD700;
      margin-bottom: 24px;
    }
    .badge::before {
      content: '';
      width: 6px; height: 6px;
      background: #FFD700;
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .hint {
      font-size: 13px;
      color: #555;
    }
    .hint span { color: #FFD700; }
  </style>
</head>
<body>

  <div class="logo">K</div>
  <div class="badge">AI ასისტენტი ონლაინ</div>
  <h1><span>Kärcher</span> Georgia</h1>
  <p>ესაუბრეთ ჩვენს AI ხმოვან ასისტენტს ქართულად — პროდუქტები, ფასები, სერვისი.</p>
  <div class="hint">დააჭირეთ <span>ღილაკს</span> ქვედა მარჯვენა კუთხეში →</div>

<!-- Vapi Widget: standalone assistant "კერხერი" (voice mode) -->
<script
  src="https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js"
  defer
  async
></script>

<script>
  window.addEventListener("load", () => {
    window.vapiSDK.run({
      apiKey: "22f33482-e483-4fe3-b475-0cae32d1cb4b",
      assistant: "a4cac016-c4b7-4c6b-89b0-9ecf5fd5b194",
      config: {
        position: "bottom-right"
      }
    });
  });
</script>

</body>
</html>
